name: TTT pipeline

on:
  workflow_dispatch:
    inputs:
      step:
        description: "Aja vain yksi askel (jätä tyhjäksi = kaikki)"
        required: false
        default: ""
      dry_run:
        description: "Dry run (ei kirjoiteta kantaan)"
        type: boolean
        default: false
  schedule:
    # Joka yö klo 03:00 UTC
    - cron: "0 3 * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TTT_EXPORT_DIR: public/data
        run: |
          ARGS=""
          if [ -n "${{ inputs.step }}" ]; then ARGS="$ARGS --step ${{ inputs.step }}"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python scripts/ttt_pipeline.py $ARGS

      - name: Commit updated JSON exports
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --cached --quiet; then
            echo "Ei muutoksia JSON-tiedostoihin"
          else
            git commit -m "chore(data): päivitä JSON-export [skip ci]"
            git push
          fi
