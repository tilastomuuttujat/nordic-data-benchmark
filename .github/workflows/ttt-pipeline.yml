name: TTT pipeline

on:
  workflow_dispatch:
    inputs:
      step:
        description: "Aja vain yksi askel (jätä tyhjäksi = kaikki)"
        required: false
        default: ""
      dry_run:
        description: "Dry run (ei kirjoiteta kantaan)"
        type: boolean
        default: false
  schedule:
    # Joka yö klo 03:00 UTC
    - cron: "0 3 * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.step }}" ]; then ARGS="$ARGS --step ${{ inputs.step }}"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python scripts/ttt_pipeline.py $ARGS
