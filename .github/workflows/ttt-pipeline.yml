name: TTT pipeline

on:
  workflow_dispatch:
    inputs:
      pipeline:
        description: "Kumpi pipeline ajetaan"
        required: false
        default: "kaikki"
        type: choice
        options:
          - kaikki
          - ttt_pipeline
          - indicator_pipeline
          - budjetti_pipeline
          - nordic_pipeline
          - lifecycle_pipeline
      step:
        description: "Aja vain yksi askel (jätä tyhjäksi = kaikki; askel-nimet eroavat pipelineittain)"
        required: false
        default: ""
      dry_run:
        description: "Dry run (ei kirjoiteta kantaan)"
        type: boolean
        default: false
  schedule:
    # Joka yö klo 03:00 UTC — ajetaan kaikki järjestyksessä
    - cron: "0 3 * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # ── 1. ttt_pipeline.py — laskee elasticities, OLS, nordic, COFOG ──
      - name: Run ttt_pipeline.py
        if: ${{ inputs.pipeline == '' || inputs.pipeline == 'kaikki' || inputs.pipeline == 'ttt_pipeline' }}
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TTT_SB_URL:           ${{ secrets.SUPABASE_URL }}
          TTT_SB_SERVICE_KEY:   ${{ secrets.SUPABASE_SERVICE_KEY }}
          TTT_EXPORT_DIR:       public/data
        run: |
          ARGS=""
          if [ -n "${{ inputs.step }}" ] && [ "${{ inputs.pipeline }}" = "ttt_pipeline" ]; then
            ARGS="$ARGS --step ${{ inputs.step }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python scripts/ttt_pipeline.py $ARGS

      # ── 2. indicator_pipeline.py — luokittelee indikaattorit teemoihin ──
      - name: Run indicator_pipeline.py
        if: ${{ inputs.pipeline == '' || inputs.pipeline == 'kaikki' || inputs.pipeline == 'indicator_pipeline' }}
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TTT_SB_URL:           ${{ secrets.SUPABASE_URL }}
          TTT_SB_SERVICE_KEY:   ${{ secrets.SUPABASE_SERVICE_KEY }}
          TTT_EXPORT_DIR:       public/data
        run: |
          ARGS=""
          if [ -n "${{ inputs.step }}" ] && [ "${{ inputs.pipeline }}" = "indicator_pipeline" ]; then
            ARGS="$ARGS --step ${{ inputs.step }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python scripts/indicator_pipeline.py $ARGS

      # ── 3. budjetti_pipeline.py — vie sector_series.json + cofog_amounts.json ──
      - name: Run budjetti_pipeline.py
        if: ${{ inputs.pipeline == '' || inputs.pipeline == 'kaikki' || inputs.pipeline == 'budjetti_pipeline' }}
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TTT_SB_URL:           ${{ secrets.SUPABASE_URL }}
          TTT_SB_SERVICE_KEY:   ${{ secrets.SUPABASE_SERVICE_KEY }}
          TTT_EXPORT_DIR:       public/data
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python scripts/budjetti_pipeline.py $ARGS

      # ── 4. nordic_pipeline.py — vie nordic_comparison.json ──
      - name: Run nordic_pipeline.py
        if: ${{ inputs.pipeline == '' || inputs.pipeline == 'kaikki' || inputs.pipeline == 'nordic_pipeline' }}
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TTT_SB_URL:           ${{ secrets.SUPABASE_URL }}
          TTT_SB_SERVICE_KEY:   ${{ secrets.SUPABASE_SERVICE_KEY }}
          TTT_EXPORT_DIR:       public/data
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python scripts/nordic_pipeline.py $ARGS

      # ── 5. lifecycle_pipeline.py — vie lifecycle.json ──
      - name: Run lifecycle_pipeline.py
        if: ${{ inputs.pipeline == '' || inputs.pipeline == 'kaikki' || inputs.pipeline == 'lifecycle_pipeline' }}
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TTT_SB_URL:           ${{ secrets.SUPABASE_URL }}
          TTT_SB_SERVICE_KEY:   ${{ secrets.SUPABASE_SERVICE_KEY }}
          TTT_EXPORT_DIR:       public/data
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python scripts/lifecycle_pipeline.py $ARGS

      # ── Commit ──
      - name: Commit updated JSON exports
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --cached --quiet; then
            echo "Ei muutoksia JSON-tiedostoihin"
          else
            git commit -m "chore(data): päivitä JSON-export [skip ci]"
            git push
          fi
