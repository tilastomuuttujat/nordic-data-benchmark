name: TTT pipeline

on:
  workflow_dispatch:
    inputs:
      pipeline:
        description: "Kumpi pipeline ajetaan"
        required: false
        default: "molemmat"
        type: choice
        options:
          - molemmat
          - ttt_pipeline
          - indicator_pipeline
      step:
        description: "Aja vain yksi askel (jätä tyhjäksi = kaikki; huom. askel-nimet eroavat pipelineittain)"
        required: false
        default: ""
      dry_run:
        description: "Dry run (ei kirjoiteta kantaan)"
        type: boolean
        default: false
  schedule:
    # Joka yö klo 03:00 UTC
    - cron: "0 3 * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run ttt_pipeline.py
        # Ohitetaan jos käyttäjä valitsi vain indicator_pipeline
        if: ${{ inputs.pipeline != 'indicator_pipeline' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TTT_SB_URL: ${{ secrets.SUPABASE_URL }}
          TTT_SB_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TTT_EXPORT_DIR: public/data
        run: |
          ARGS=""
          if [ -n "${{ inputs.step }}" ]; then ARGS="$ARGS --step ${{ inputs.step }}"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python scripts/ttt_pipeline.py $ARGS

      - name: Run indicator_pipeline.py
        # Ohitetaan jos käyttäjä valitsi vain ttt_pipeline
        # Jos step on asetettu yksittäisen pipelinen ajoon, ei anneta sitä toiselle
        if: ${{ inputs.pipeline != 'ttt_pipeline' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TTT_SB_URL: ${{ secrets.SUPABASE_URL }}
          TTT_SB_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TTT_EXPORT_DIR: public/data
        run: |
          ARGS=""
          # Step-argumentti annetaan vain jos pipeline on valittu eksplisiittisesti
          if [ -n "${{ inputs.step }}" ] && [ "${{ inputs.pipeline }}" = "indicator_pipeline" ]; then
            ARGS="$ARGS --step ${{ inputs.step }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          python scripts/indicator_pipeline.py $ARGS

      - name: Commit updated JSON exports
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --cached --quiet; then
            echo "Ei muutoksia JSON-tiedostoihin"
          else
            git commit -m "chore(data): päivitä JSON-export [skip ci]"
            git push
          fi
